
<style>
  body-like { display: block; }
  .proof-wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; }
  .step-pill { background: #E6F1FB; color: #0C447C; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 12px; flex-shrink: 0; }
  .step-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .step-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; margin-bottom: 0.75rem; }
  .step-body strong { font-weight: 500; color: var(--color-text-primary); }
  .math-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 13px; color: var(--color-text-primary); margin: 8px 0; line-height: 2; }
  .nav { display: flex; align-items: center; gap: 10px; margin-top: 1rem; flex-wrap: wrap; }
  .nav button { padding: 6px 16px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; }
  .nav button:hover { background: var(--color-background-secondary); }
  .nav button:disabled { opacity: 0.35; cursor: default; }
  .nav button.primary { background: #E6F1FB; color: #0C447C; border-color: #B5D4F4; }
  .nav button.primary:hover { background: #B5D4F4; }
  .dots { display: flex; gap: 6px; align-items: center; margin-left: auto; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-border-secondary); transition: background 0.2s; }
  .dot.on { background: #378ADD; }
  .canvas-wrap { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); background: var(--color-background-secondary); padding: 8px; display: flex; justify-content: center; margin-bottom: 10px; }
  canvas { display: block; }
  .given-box { background: #EAF3DE; border: 0.5px solid #97C459; border-radius: var(--border-radius-md); padding: 8px 14px; font-size: 13px; color: #27500A; margin-bottom: 10px; line-height: 1.8; }
  .conclude-box { background: #E6F1FB; border: 0.5px solid #85B7EB; border-radius: var(--border-radius-md); padding: 8px 14px; font-size: 13px; color: #0C447C; margin-bottom: 10px; line-height: 1.8; }
  .qed { display: inline-block; background: #0F6E56; color: #E1F5EE; font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 500; margin-top: 4px; }
</style>

<div class="proof-wrap">
  <div class="canvas-wrap"><canvas id="proofCanvas" width="440" height="260"></canvas></div>
  <div class="step-header">
    <span class="step-pill" id="stepPill">Step 1 of 7</span>
    <span class="step-title" id="stepTitle"></span>
  </div>
  <div id="stepContent"></div>
  <div class="nav">
    <button id="prevBtn" onclick="go(-1)" disabled>← Prev</button>
    <button id="nextBtn" class="primary" onclick="go(1)">Next →</button>
    <div class="dots" id="dots"></div>
  </div>
</div>

<script>
const steps = [
  {
    title: "Given & to prove",
    draw: drawBase,
    content: () => `
      <div class="given-box">
        <strong>Given:</strong> Triangle ABC. Line DE is drawn such that <strong>DE ∥ BC</strong>,
        where D lies on AB and E lies on AC.
      </div>
      <div class="conclude-box">
        <strong>To prove:</strong> AD/DB = AE/EC
      </div>
      <p class="step-body">We will use the <strong>area method</strong> — comparing areas of triangles that share a common height or base. This is the standard Class 10 proof accepted by CBSE.</p>`
  },
  {
    title: "Construct the heights",
    draw: drawHeights,
    content: () => `
      <p class="step-body">Draw perpendiculars from D and E to BC and AC respectively:</p>
      <p class="step-body">• Let <strong>h₁</strong> = height from D to AE (perpendicular to AE extended)</p>
      <p class="step-body">• Let <strong>h₂</strong> = height from E to AD (perpendicular to AD extended)</p>
      <div class="math-box">These heights will let us express areas of △ADE, △BDE, and △CDE in terms of the segments AD, DB, AE, EC.</div>`
  },
  {
    title: "Express ar(△ADE) in two ways",
    draw: drawTriADE,
    content: () => `
      <p class="step-body">The area of △ADE can be written using base AD (with height h₂) or base AE (with height h₁):</p>
      <div class="math-box">
        ar(△ADE) = ½ × AD × h₂ &nbsp;&nbsp; … (using base AD)<br>
        ar(△ADE) = ½ × AE × h₁ &nbsp;&nbsp; … (using base AE)
      </div>
      <p class="step-body">We will use the first form next to find a ratio involving AD.</p>`
  },
  {
    title: "Area of △BDE",
    draw: drawTriBDE,
    content: () => `
      <p class="step-body">△BDE has base <strong>DB</strong> and the same height h₂ from D (since B and A are on the same side of line DE):</p>
      <div class="math-box">
        ar(△BDE) = ½ × DB × h₂
      </div>
      <p class="step-body">Now we can take a ratio:</p>
      <div class="math-box">
        ar(△ADE) / ar(△BDE) = (½ × AD × h₂) / (½ × DB × h₂)<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; = <strong>AD / DB</strong>
      </div>`
  },
  {
    title: "Area of △CDE",
    draw: drawTriCDE,
    content: () => `
      <p class="step-body">△CDE has base <strong>EC</strong> and the same height h₁ from E:</p>
      <div class="math-box">
        ar(△CDE) = ½ × EC × h₁
      </div>
      <p class="step-body">Taking the ratio with △ADE:</p>
      <div class="math-box">
        ar(△ADE) / ar(△CDE) = (½ × AE × h₁) / (½ × EC × h₁)<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; = <strong>AE / EC</strong>
      </div>`
  },
  {
    title: "Key equality: same base DE, same height",
    draw: drawSameBase,
    content: () => `
      <p class="step-body">Since <strong>DE ∥ BC</strong>, triangles △BDE and △CDE lie between the same two parallel lines.</p>
      <p class="step-body">They share the same base <strong>DE</strong>, so their heights from B and C to line DE are equal.</p>
      <div class="math-box">
        ∴ ar(△BDE) = ar(△CDE) &nbsp;&nbsp; … (same base DE, DE ∥ BC)
      </div>
      <p class="step-body">This is the crucial step — it links the two ratios we found.</p>`
  },
  {
    title: "Conclude: AD/DB = AE/EC",
    draw: drawFinal,
    content: () => `
      <p class="step-body">From Steps 4 and 5:</p>
      <div class="math-box">
        AD/DB = ar(△ADE) / ar(△BDE)<br>
        AE/EC = ar(△ADE) / ar(△CDE)
      </div>
      <p class="step-body">From Step 6, ar(△BDE) = ar(△CDE), so:</p>
      <div class="math-box">
        ar(△ADE) / ar(△BDE) = ar(△ADE) / ar(△CDE)
      </div>
      <div class="conclude-box"><strong>Therefore: AD/DB = AE/EC</strong> &nbsp; ✓</div>
      <p class="step-body">This completes the proof. <span class="qed">Q.E.D.</span></p>`
  }
];

let cur = 0;

const canvas = document.getElementById('proofCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const A = [220, 18], B = [55, 230], C = [385, 230];
const t = 0.48;
function lerp(a, b, t) { return a + (b-a)*t; }
const D = [lerp(A[0],B[0],t), lerp(A[1],B[1],t)];
const E = [lerp(A[0],C[0],t), lerp(A[1],C[1],t)];

function isDark() { return window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches; }
function tc(l,d) { return isDark() ? d : l; }

function clearCanvas() { ctx.clearRect(0,0,W,H); }

function drawTriangle(highlight) {
  ctx.strokeStyle = tc('#B4B2A9','#5F5E5A');
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(A[0],A[1]); ctx.lineTo(B[0],B[1]);
  ctx.lineTo(C[0],C[1]); ctx.closePath();
  ctx.stroke();

  ctx.strokeStyle = tc('#D85A30','#F0997B');
  ctx.lineWidth = 2;
  ctx.setLineDash([5,3]);
  ctx.beginPath(); ctx.moveTo(D[0],D[1]); ctx.lineTo(E[0],E[1]); ctx.stroke();
  ctx.setLineDash([]);

  const textColor = tc('#2C2C2A','#D3D1C7');
  ctx.fillStyle = textColor;
  ctx.font = 'bold 13px var(--font-sans,sans-serif)';
  ctx.textAlign = 'center';
  ctx.fillText('A', A[0], A[1]-8);
  ctx.fillText('B', B[0]-10, B[1]+14);
  ctx.fillText('C', C[0]+10, C[1]+14);
  ctx.fillStyle = tc('#993C1D','#F0997B');
  ctx.fillText('D', D[0]-12, D[1]+4);
  ctx.fillText('E', E[0]+12, E[1]+4);
  ctx.fillStyle = tc('#185FA5','#85B7EB');
  ctx.font = '11px var(--font-sans,sans-serif)';
  ctx.fillText('DE ∥ BC', (D[0]+E[0])/2, (D[1]+E[1])/2-9);
}

function fillTri(pts, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  pts.slice(1).forEach(p => ctx.lineTo(p[0],p[1]));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawBase() {
  clearCanvas(); drawTriangle();
  ctx.fillStyle = tc('#185FA5','#85B7EB');
  ctx.font = '11px var(--font-sans,sans-serif)';
  ctx.textAlign = 'center';
  const adMid = [lerp(A[0],D[0],.5)-12, lerp(A[1],D[1],.5)];
  ctx.fillText('AD', adMid[0], adMid[1]);
  const dbMid = [lerp(D[0],B[0],.5)-12, lerp(D[1],B[1],.5)];
  ctx.fillStyle = tc('#0F6E56','#5DCAA5');
  ctx.fillText('DB', dbMid[0], dbMid[1]);
  const aeMid = [lerp(A[0],E[0],.5)+12, lerp(A[1],E[1],.5)];
  ctx.fillStyle = tc('#185FA5','#85B7EB');
  ctx.fillText('AE', aeMid[0], aeMid[1]);
  const ecMid = [lerp(E[0],C[0],.5)+12, lerp(E[1],C[1],.5)];
  ctx.fillStyle = tc('#0F6E56','#5DCAA5');
  ctx.fillText('EC', ecMid[0], ecMid[1]);
}

function drawHeights() {
  clearCanvas();
  function foot(px, py, ax, ay, bx, by) {
    const dx=bx-ax, dy=by-ay, t=((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy);
    return [ax+t*dx, ay+t*dy];
  }
  const fD = foot(D[0],D[1], A[0],A[1], E[0],E[1]);
  const fE = foot(E[0],E[1], A[0],A[1], D[0],D[1]);
  ctx.strokeStyle = tc('#AA6600','#EF9F27');
  ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(D[0],D[1]); ctx.lineTo(fD[0],fD[1]); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(E[0],E[1]); ctx.lineTo(fE[0],fE[1]); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = tc('#AA6600','#EF9F27');
  ctx.font = '11px var(--font-sans,sans-serif)';
  ctx.fillText('h₂', fD[0]+8, (D[1]+fD[1])/2);
  ctx.fillText('h₁', fE[0]-16, (E[1]+fE[1])/2);
  drawTriangle();
}

function drawTriADE() {
  clearCanvas();
  fillTri([A,D,E], tc('#B5D4F4','#185FA5'), 0.35);
  drawTriangle();
  ctx.fillStyle = tc('#0C447C','#B5D4F4');
  ctx.font = 'bold 12px var(--font-sans,sans-serif)';
  ctx.textAlign='center';
  ctx.fillText('△ADE', (A[0]+D[0]+E[0])/3, (A[1]+D[1]+E[1])/3+4);
}

function drawTriBDE() {
  clearCanvas();
  fillTri([A,D,E], tc('#B5D4F4','#185FA5'), 0.2);
  fillTri([B,D,E], tc('#9FE1CB','#0F6E56'), 0.35);
  drawTriangle();
  ctx.fillStyle = tc('#085041','#9FE1CB');
  ctx.font = 'bold 12px var(--font-sans,sans-serif)';
  ctx.textAlign='center';
  ctx.fillText('△BDE', (B[0]+D[0]+E[0])/3, (B[1]+D[1]+E[1])/3-4);
}

function drawTriCDE() {
  clearCanvas();
  fillTri([A,D,E], tc('#B5D4F4','#185FA5'), 0.2);
  fillTri([C,D,E], tc('#F5C4B3','#993C1D'), 0.35);
  drawTriangle();
  ctx.fillStyle = tc('#712B13','#F5C4B3');
  ctx.font = 'bold 12px var(--font-sans,sans-serif)';
  ctx.textAlign='center';
  ctx.fillText('△CDE', (C[0]+D[0]+E[0])/3, (C[1]+D[1]+E[1])/3-4);
}

function drawSameBase() {
  clearCanvas();
  fillTri([B,D,E], tc('#9FE1CB','#0F6E56'), 0.35);
  fillTri([C,D,E], tc('#F5C4B3','#993C1D'), 0.3);
  drawTriangle();
  ctx.strokeStyle = tc('#0F6E56','#5DCAA5');
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(D[0],D[1]); ctx.lineTo(E[0],E[1]); ctx.stroke();
  ctx.fillStyle = tc('#2C2C2A','#D3D1C7');
  ctx.font = '11px var(--font-sans,sans-serif)';
  ctx.textAlign='center';
  ctx.fillText('Same base DE', (D[0]+E[0])/2, (D[1]+E[1])/2+18);
  ctx.fillText('= same height', (D[0]+E[0])/2, (D[1]+E[1])/2+31);
}

function drawFinal() {
  clearCanvas();
  fillTri([A,D,E], tc('#B5D4F4','#185FA5'), 0.28);
  fillTri([B,D,E], tc('#9FE1CB','#0F6E56'), 0.28);
  fillTri([C,D,E], tc('#F5C4B3','#993C1D'), 0.28);
  drawTriangle();
  ctx.fillStyle = tc('#185FA5','#85B7EB');
  ctx.font = '11px var(--font-sans,sans-serif)';
  ctx.textAlign='center';
  ctx.fillText('AD/DB', lerp(A[0],B[0],.5)-18, lerp(A[1],B[1],.5));
  ctx.fillStyle = tc('#0F6E56','#5DCAA5');
  ctx.fillText('AE/EC', lerp(A[0],C[0],.5)+18, lerp(A[1],C[1],.5));
  ctx.fillStyle = tc('#2C2C2A','#D3D1C7');
  ctx.font = 'bold 13px var(--font-sans,sans-serif)';
  ctx.fillText('=', (A[0]+B[0]+C[0])/3, (A[1]+B[1]+C[1])/3);
}

const drawFns = [drawBase, drawHeights, drawTriADE, drawTriBDE, drawTriCDE, drawSameBase, drawFinal];

function render() {
  document.getElementById('stepPill').textContent = `Step ${cur+1} of ${steps.length}`;
  document.getElementById('stepTitle').textContent = steps[cur].title;
  document.getElementById('stepContent').innerHTML = steps[cur].content();
  drawFns[cur]();
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === steps.length-1;
  document.getElementById('nextBtn').textContent = cur === steps.length-1 ? 'Done' : 'Next →';
  const dots = document.getElementById('dots');
  dots.innerHTML = steps.map((_,i) => `<div class="dot ${i===cur?'on':''}"></div>`).join('');
}

function go(dir) { cur = Math.max(0, Math.min(steps.length-1, cur+dir)); render(); }

render();
</script>
